<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Wireless Hub</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <!-- LANDING / PAYWALL LAYER -->
  <div id="landing-screen" class="overlay active">
    <div class="landing-content">
      <div class="landing-logo">
        <img src="logo.png" alt="Logo">
        <div class="logo-glow"></div>
      </div>
      <h1>WIRELESS HUB</h1>
      <p class="tagline">Your PC. In your pocket.</p>
      
      <div id="status-box">
        <!-- Will show trial time or purchase options -->
      </div>

      <div class="landing-actions">
        <button id="start-trial-btn" class="main-btn trial">START 24HR TRIAL</button>
        <button id="buy-now-btn" class="main-btn buy">LIFETIME ACCESS - $9.00</button>
      </div>
      
      <div class="features-list">
        <span><i class="fas fa-bolt"></i> Low Latency</span>
        <span><i class="fas fa-keyboard"></i> Full Keyboard</span>
        <span><i class="fas fa-mouse"></i> Multi-Touch Pad</span>
      </div>

      <div class="landing-footer">
        <a href="https://github.com/toidiputS/Wireless-Hub-PWA" target="_blank">
          <i class="fab fa-github"></i> hub-v1.0.0
        </a>
      </div>
    </div>
  </div>

  <!-- MAIN APP CONTAINER (Hidden until trial/paid) -->
  <main id="app-container" style="display: none;">
    <!-- TRACKPAD -->
    <section id="trackpad">
      <div class="grid-bg"></div>
      <div class="trackpad-hint">
        <h3>HUB</h3>
        <p>TAP = CLICK • 2-FINGER = SCROLL</p>
      </div>
    </section>

    <!-- INPUT BAR -->
    <div class="type-container">
      <button id="clear-btn">CLEAR</button>
      <textarea id="type-input" placeholder="Type paragraph..." rows="1" inputmode="text" spellcheck="false"></textarea>
      <button id="enter-btn">ENTER</button>
    </div>

    <!-- MOUSE BUTTONS -->
    <div class="mouse-row">
      <button class="mouse-btn left-btn" id="mouse-left">LEFT</button>
      <button class="mouse-btn mid-btn" id="mouse-middle">•</button>
      <button class="mouse-btn right-btn" id="mouse-right">RIGHT</button>
    </div>

    <!-- ARROW ROW -->
    <div class="arrow-row">
      <button class="arrow-btn" data-key="left">←</button>
      <button class="arrow-btn" data-key="up">↑</button>
      <button class="arrow-btn" data-key="down">↓</button>
      <button class="arrow-btn" data-key="right">→</button>
    </div>

    <!-- SPECIALTY GRID -->
    <div class="specialty-grid">
      <button class="spec-btn mod" data-key="ctrl">CTRL</button>
      <button class="spec-btn mod" data-key="alt">ALT</button>
      <button class="spec-btn mod" data-key="shift">SHIFT</button>
      <button class="spec-btn" data-key="ins">INS</button>
      
      <button class="spec-btn" data-key="esc">ESC</button>
      <button class="spec-btn" data-key="tab">TAB</button>
      <button class="spec-btn" data-key="undo">UNDO</button>
      <button class="spec-btn" data-key="del">DEL</button>
      
      <button class="spec-btn" data-key="copy">COPY</button>
      <button class="spec-btn" data-key="paste">PASTE</button>
      <button class="spec-btn" data-key="home">HOME</button>
      <button class="spec-btn" data-key="end">END</button>
      
      <button class="spec-btn" data-key="pgup">PGUP</button>
      <button class="spec-btn" data-key="pgdn">PGDN</button>
      <button class="spec-btn" id="settings-toggle-btn"><i class="fas fa-cog"></i></button>
      <button class="spec-btn mod" data-key="win"><i class="fab fa-windows"></i></button>
    </div>
  </main>

  <!-- Settings -->
  <div id="settings-modal" class="modal">
    <div class="modal-box">
      <h2>ADJUST HUB</h2>
      <div class="setting"><label>LETTERING SIZE (TEXT)</label><input type="range" id="font-scale-slider" min="0.8" max="2.5" step="0.1" value="1.0"></div>
      <div class="setting"><label>BUTTON SIZE (CONTROLS)</label><input type="range" id="btn-scale-slider" min="0.7" max="1.4" step="0.05" value="1.0"></div>
      <div class="setting"><label>CURSR SENSITIVITY</label><input type="range" id="sensitivity-slider" min="0.1" max="5.0" step="0.1" value="1.0"></div>
      
      <div class="modal-footer">
        <a href="https://github.com/toidiputS/Wireless-Hub-PWA" target="_blank"><i class="fab fa-github"></i> VIEW ON GITHUB</a>
      </div>

      <button id="close-settings" class="close-btn">SAVE & CLOSE</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
